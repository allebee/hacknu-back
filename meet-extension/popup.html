<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Canvas Meet Sync</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 320px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #1a1a2e;
        color: #eee;
        padding: 16px;
      }
      h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 12px;
        color: #8b5cf6;
      }
      label {
        font-size: 12px;
        color: #aaa;
        display: block;
        margin-bottom: 4px;
        margin-top: 10px;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #333;
        border-radius: 6px;
        background: #16213e;
        color: #eee;
        font-size: 13px;
        outline: none;
      }
      input:focus {
        border-color: #8b5cf6;
      }
      button {
        width: 100%;
        margin-top: 14px;
        padding: 10px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      #startBtn {
        background: #8b5cf6;
        color: white;
      }
      #startBtn:hover {
        background: #7c3aed;
      }
      #startBtn.active {
        background: #ef4444;
      }
      #startBtn.active:hover {
        background: #dc2626;
      }
      #status {
        margin-top: 10px;
        font-size: 11px;
        color: #888;
        text-align: center;
      }
      .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        margin-right: 6px;
      }
      .dot.green {
        background: #22c55e;
      }
      .dot.red {
        background: #ef4444;
      }
      .dot.grey {
        background: #666;
      }
    </style>
  </head>
  <body>
    <h2>🎨 Canvas Meet Sync</h2>

    <label for="roomId">Canvas Room ID</label>
    <input
      type="text"
      id="roomId"
      placeholder="e.g. e60b1c8e-4eeb-4104-aba9-f946ebe5e31f"
    />

    <label for="backendUrl">Backend URL</label>
    <input type="text" id="backendUrl" placeholder="http://localhost:8000" />

    <button id="startBtn">Start Capturing</button>

    <div id="status"><span class="dot grey"></span>Not connected</div>

    <script src="popup.js"></script>
  </body>
</html>
