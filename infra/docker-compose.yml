services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hacknu
      POSTGRES_PASSWORD: hacknu
      POSTGRES_DB: hacknu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacknu"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ../hacknu-back
      dockerfile: Dockerfile
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "${APP_PORT:-9000}:8000"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://hacknu:hacknu@db:5432/hacknu
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
