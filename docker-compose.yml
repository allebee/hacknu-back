services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hacknu
      POSTGRES_PASSWORD: hacknu
      POSTGRES_DB: hacknu
    # No external port — backend connects via Docker internal network (db:5432)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hacknu"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./hacknu-back
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://hacknu:hacknu@db:5432/hacknu
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./hacknu-back:/app
    restart: unless-stopped

volumes:
  pgdata:
